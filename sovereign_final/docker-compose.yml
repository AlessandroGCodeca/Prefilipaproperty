services:

  db:
    image: postgis/postgis:16-3.4
    container_name: sovereign_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sovereign
      POSTGRES_USER:     sovereign
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sovereign2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign"]
      interval: 10s
      timeout: 5s
      retries: 5

  model-runner:
    image: ai/mistral:7b-instruct-q4_k_m
    container_name: sovereign_dmr
    restart: unless-stopped
    ports:
      - "12434:12434"
    volumes:
      - model_cache:/root/.docker/models

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sovereign_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL:          postgresql://sovereign:${DB_PASSWORD:-sovereign2026}@db:5432/sovereign
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      CADASTRAL_API_KEY:     ${CADASTRAL_API_KEY:-}
      DMR_ENDPOINT:          http://model-runner:12434/v1
      LLM_MODEL:             mistral:7b-instruct-q4_k_m
    volumes:
      - ./contracts:/app/contracts
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sovereign_scheduler
    restart: unless-stopped
    environment:
      DATABASE_URL:          postgresql://sovereign:${DB_PASSWORD:-sovereign2026}@db:5432/sovereign
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      CADASTRAL_API_KEY:     ${CADASTRAL_API_KEY:-}
      DMR_ENDPOINT:          http://model-runner:12434/v1
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: python scheduler.py

volumes:
  pgdata:
  model_cache:
